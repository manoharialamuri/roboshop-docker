services:
  user:
    build: ./user
    image: manohari07/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb

  cart:
    build: ./cart
    image: manohari07/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue

  catalogue:
    build: ./catalogue
    image: manohari07/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  shipping:
    build: ./shipping
    image: manohari07/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
      - cart

  payment:
    build: ./payment
    image: manohari07/payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "cart" 
      CART_PORT: "8080" 
      USER_HOST: "user" 
      USER_PORT: "8080" 
      AMQP_HOST: "rabbitmq" 
      AMQP_USER: "roboshop" 
      AMQP_PASS: "roboshop123"
    depends_on:
    - cart
    - user
    - rabbitmq
 
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: manohari07/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mongodb
    volumes:
    - mongodb:/data/db

  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data

  mysql:
    build: ./mysql # it moves to mongodb directory
    image: manohari07/mysql:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
    volumes:
    - rabbitmq:/var/lib/rabbitmq

  frontend:
    build: ./frontend
    image: manohari07/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment
      
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually

volumes:
    mongodb
    redis
    mysql
    rabbitmq



